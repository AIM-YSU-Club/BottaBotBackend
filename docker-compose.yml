services:
    backend:
        # 현재 디렉토리(.)에 있는 방금 만든 Spring Boot Dockerfile을 사용해 빌드
        build: .
        container_name: bottabot_backend
        depends_on:
            - db
            - redis
        env_file: .env
        environment:
            # 파이썬 커넥션 문자열 대신, 자바/스프링이 읽을 수 있는 포맷으로 변경
            SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
            SPRING_DATASOURCE_USERNAME: ${DB_USER}
            SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

            # 레디스 설정도 스프링 환경변수로 변경
            SPRING_DATA_REDIS_HOST: redis
            SPRING_DATA_REDIS_PORT: 6379
            SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

        # 호스트 8080 : 컨테이너 8080 (스프링 부트 기본 포트)
        ports:
            - "8080:8080"

        # (주의) 로컬 코드를 덮어씌우는 파이썬식 볼륨 바인딩은 컴파일 언어인 자바와 충돌하므로 제거했습니다.
        restart: always

    db:
        # AI 기능에 필수적인 pgvector 이미지는 그대로 사용!
        image: pgvector/pgvector:pg16
        container_name: pgvector-db
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - ./db_data:/var/lib/postgresql/data
            - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

    redis:
        image: redis:7-alpine
        container_name: bottabot_redis
        ports:
            - "6379:6379"
        command: redis-server --requirepass "${REDIS_PASSWORD}"
        restart: always
