version: '3.8'

services:
  backend:
    # 현재 디렉토리(.)의 Dockerfile을 빌드
    build: .
    # 컨테이너 이름 지정
    container_name: bottabot_backend
    depends_on:
      - db
      - redis

    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

    # 호스트 포트 8000번과 컨테이너 포트 8000번 연결
    ports:
      - "8000:8000"
    # 소스 코드 변경 시 실시간 반영을 위한 볼륨 바인딩 (개발용)
    volumes:
      - .:/app
    # 컨테이너 다운 시 자동 재시작 설정
    restart: always

  db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # 현재 디렉토리의 postgres_data 폴더에 데이터 저장
      - ./db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7-alpine
    container_name: bottabot_redis
    ports:
      - "6379:6379"  # AI 서버가 외부에서 접속해야 하므로 포트를 열어줍니다.
    # 중요: 외부 서버(AI 서버)에서 접속해야 하므로 비밀번호 설정을 강력히 권장합니다.
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    restart: always